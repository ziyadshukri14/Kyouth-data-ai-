services:
  backend:
    image: backend
    pull_policy: build
    build:
      context: backend
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    networks:
      - app-network

  frontend:
    image: frontend
    pull_policy: build
    build:
      context: frontend
    ports:
      - "8000:8000"
    env_file:
      - frontend/.env
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge