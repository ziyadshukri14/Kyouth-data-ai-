<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }

      .chart-card {
        border-radius: 12px;
        border: none;
      }

      .chart-box {
        height: 340px;
        position: relative;
      }

      canvas {
        max-height: 320px;
      }

      .result-card {
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold mb-1">Job Dashboard</h2>
          <p class="text-muted mb-0">
            Visualizing the jobs database using Chart.js
          </p>
        </div>

        <a href="/" class="btn btn-outline-secondary"> ← Back to Chat </a>
      </div>

      <div id="errorBox"></div>

      <!-- Search bar -->
      <div class="card shadow-sm chart-card p-3 mb-4">
        <label for="searchInput" class="form-label fw-semibold">
          Search Jobs Database
        </label>

        <input
          type="text"
          id="searchInput"
          class="form-control"
          placeholder="Search by job title, company, or description..."
        />

        <div id="resultCount" class="text-muted small mt-2"></div>
        <div id="searchResults" class="mt-3"></div>
      </div>

      <!-- Charts -->
      <div class="row g-4">
        <div class="col-md-5">
          <div class="card chart-card shadow-sm p-3">
            <h5 class="fw-semibold mb-3">Company Distribution</h5>
            <div class="chart-box">
              <canvas id="companyChart"></canvas>
            </div>
          </div>
        </div>

        <div class="col-md-7">
          <div class="card chart-card shadow-sm p-3">
            <h5 class="fw-semibold mb-3">Job Title Distribution</h5>
            <div class="chart-box">
              <canvas id="titleChart"></canvas>
            </div>
          </div>
        </div>

        <div class="col-md-12">
          <div class="card chart-card shadow-sm p-3">
            <h5 class="fw-semibold mb-3">Description Length Statistics</h5>
            <div class="chart-box">
              <canvas id="descriptionChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      function showError(message) {
        document.getElementById("errorBox").innerHTML =
          `<div class="alert alert-danger">${message}</div>`;
      }

      async function loadCharts() {
        try {
          const response = await fetch("/api/charts");

          if (!response.ok) {
            showError("Failed to load chart data.");
            return;
          }

          const data = await response.json();

          if (data.error) {
            showError("API error: " + data.error);
            return;
          }

          if (!data.companies.labels.length) {
            showError("No chart data found. Please check jobs.db.");
            return;
          }

          new Chart(document.getElementById("companyChart"), {
            type: "pie",
            data: {
              labels: data.companies.labels,
              datasets: [
                {
                  label: "Jobs",
                  data: data.companies.values,
                  backgroundColor: [
                    "#6c63ff",
                    "#20c997",
                    "#ffc107",
                    "#ff6584",
                    "#0dcaf0",
                    "#198754",
                    "#fd7e14",
                    "#6610f2",
                    "#6f42c1",
                    "#adb5bd",
                  ],
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "bottom",
                },
              },
            },
          });

          new Chart(document.getElementById("titleChart"), {
            type: "bar",
            data: {
              labels: data.titles.labels,
              datasets: [
                {
                  label: "Job Count",
                  data: data.titles.values,
                  backgroundColor: "#6c63ff",
                  borderRadius: 6,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              indexAxis: "y",
              plugins: {
                legend: {
                  display: false,
                },
              },
              scales: {
                x: {
                  beginAtZero: true,
                },
              },
            },
          });

          new Chart(document.getElementById("descriptionChart"), {
            type: "doughnut",
            data: {
              labels: data.descriptions.labels,
              datasets: [
                {
                  label: "Jobs",
                  data: data.descriptions.values,
                  backgroundColor: ["#6c63ff", "#20c997", "#ff6584"],
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "bottom",
                },
              },
            },
          });
        } catch (error) {
          showError("Could not connect to /api/charts.");
        }
      }

      let searchTimeout;

      function searchJobs(query) {
        clearTimeout(searchTimeout);

        searchTimeout = setTimeout(async () => {
          const container = document.getElementById("searchResults");
          const resultCount = document.getElementById("resultCount");

          if (query.length < 2) {
            container.innerHTML = "";
            resultCount.textContent = "";
            return;
          }

          try {
            const response = await fetch(
              "/api/jobs?q=" + encodeURIComponent(query),
            );

            const data = await response.json();

            if (data.error) {
              container.innerHTML = `<div class="alert alert-danger">API error: ${data.error}</div>`;
              resultCount.textContent = "";
              return;
            }

            resultCount.textContent = data.jobs.length + " job(s) found";

            if (!data.jobs.length) {
              container.innerHTML =
                "<p class='text-muted'>No results found.</p>";
              return;
            }

            container.innerHTML = `
            <div class="table-responsive">
              <table class="table table-bordered table-hover bg-white align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Source ID</th>
                    <th>Description</th>
                  </tr>
                </thead>

                <tbody>
                  ${data.jobs
                    .map(
                      (job) => `
                    <tr>
                      <td>${job.job_title || "Untitled Job"}</td>
                      <td>${job.company || "-"}</td>
                      <td>${job.source_id || "-"}</td>
                      <td class="text-muted small">${job.description || ""}</td>
                    </tr>
                  `,
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          `;
          } catch (error) {
            container.innerHTML =
              "<div class='alert alert-danger'>Could not connect to /api/jobs.</div>";
          }
        }, 300);
      }

      document
        .getElementById("searchInput")
        .addEventListener("input", function () {
          searchJobs(this.value);
        });

      loadCharts();
    </script>
  </body>
</html>
